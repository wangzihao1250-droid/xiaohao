<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项清单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .input-section {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .input-group {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        select {
            padding: 12px 10px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .filters {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            overflow-x: auto;
        }

        .filter-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            color: #333;
            border: 2px solid transparent;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .todos-section {
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .todo-item:hover {
            background: #eef0f7;
            transform: translateX(5px);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-content {
            flex: 1;
        }

        .todo-text {
            font-size: 15px;
            color: #333;
            margin-bottom: 5px;
        }

        .todo-meta {
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: #999;
        }

        .priority-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .priority-high {
            background: #fee;
            color: #d32f2f;
        }

        .priority-medium {
            background: #fff3e0;
            color: #f57c00;
        }

        .priority-low {
            background: #e8f5e9;
            color: #388e3c;
        }

        .todo-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-edit {
            background: #2196f3;
            color: white;
        }

        .btn-edit:hover {
            background: #1976d2;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background: #d32f2f;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 14px;
        }

        .footer {
            padding: 15px 20px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
        }

        .clear-btn {
            background: #f44336;
            padding: 8px 15px;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
        }

        .modal-footer button {
            flex: 1;
            padding: 12px;
        }

        .btn-cancel {
            background: #ccc;
        }

        .btn-cancel:hover {
            background: #bbb;
        }

        @media (max-width: 600px) {
            .container {
                border-radius: 0;
            }

            .header h1 {
                font-size: 24px;
            }

            .stats {
                flex-direction: row;
            }

            .input-section {
                flex-direction: column;
            }

            .input-group {
                flex-direction: column;
            }

            .filters {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>✓ 待办事项</h1>
        <p>管理您的日常任务</p>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat">
            <div class="stat-number" id="total-count">0</div>
            <div class="stat-label">总任务</div>
        </div>
        <div class="stat">
            <div class="stat-number" id="completed-count">0</div>
            <div class="stat-label">已完成</div>
        </div>
        <div class="stat">
            <div class="stat-number" id="pending-count">0</div>
            <div class="stat-label">待处理</div>
        </div>
    </div>

    <!-- Input Section -->
    <div class="input-section">
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="输入新任务..." />
            <select id="priority-select">
                <option value="low">低</option>
                <option value="medium" selected>中</option>
                <option value="high">高</option>
            </select>
        </div>
        <button onclick="addTodo()">添加</button>
    </div>

    <!-- Filters -->
    <div class="filters">
        <button class="filter-btn active" onclick="filterTodos('all')">全部</button>
        <button class="filter-btn" onclick="filterTodos('pending')">待处理</button>
        <button class="filter-btn" onclick="filterTodos('completed')">已完成</button>
        <button class="filter-btn" onclick="filterTodos('high')">高优先级</button>
    </div>

    <!-- Todos List -->
    <div class="todos-section" id="todos-list"></div>

    <!-- Footer -->
    <div class="footer">
        <span>已保存到本地</span>
        <button class="clear-btn" onclick="clearAll()">清空所有</button>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal" id="edit-modal">
    <div class="modal-content">
        <div class="modal-header">编辑任务</div>
        <div class="modal-body">
            <input type="text" id="edit-input" placeholder="任务内容" />
            <select id="edit-priority">
                <option value="low">低优先级</option>
                <option value="medium">中优先级</option>
                <option value="high">高优先级</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">取消</button>
            <button onclick="saveEdit()">保存</button>
        </div>
    </div>
</div>

<script>
    let todos = JSON.parse(localStorage.getItem('todos')) || [];
    let currentFilter = 'all';
    let editingId = null;

    // Add Todo
    function addTodo() {
        const input = document.getElementById('todo-input');
        const priority = document.getElementById('priority-select').value;
        const text = input.value.trim();

        if (!text) {
            alert('请输入任务内容');
            return;
        }

        const todo = {
            id: Date.now(),
            text,
            priority,
            completed: false,
            createdAt: new Date().toLocaleString('zh-CN')
        };

        todos.unshift(todo);
        saveTodos();
        input.value = '';
        renderTodos();
    }

    // Save Todos
    function saveTodos() {
        localStorage.setItem('todos', JSON.stringify(todos));
    }

    // Render Todos
    function renderTodos() {
        const list = document.getElementById('todos-list');
        let filtered = todos;

        if (currentFilter === 'pending') {
            filtered = todos.filter(t => !t.completed);
        } else if (currentFilter === 'completed') {
            filtered = todos.filter(t => t.completed);
        } else if (currentFilter === 'high') {
            filtered = todos.filter(t => t.priority === 'high');
        }

        if (filtered.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>暂无任务</p>
                </div>
            `;
            updateStats();
            return;
        }

        list.innerHTML = filtered.map(todo => `
            <div class="todo-item ${todo.completed ? 'completed' : ''}">
                <input 
                    type="checkbox" 
                    class="checkbox" 
                    ${todo.completed ? 'checked' : ''}
                    onchange="toggleTodo(${todo.id})"
                />
                <div class="todo-content">
                    <div class="todo-text">${escapeHtml(todo.text)}</div>
                    <div class="todo-meta">
                        <span class="priority-badge priority-${todo.priority}">
                            ${priorityText(todo.priority)}
                        </span>
                        <span>${todo.createdAt}</span>
                    </div>
                </div>
                <div class="todo-actions">
                    <button class="btn-small btn-edit" onclick="openEdit(${todo.id})">编辑</button>
                    <button class="btn-small btn-delete" onclick="deleteTodo(${todo.id})">删除</button>
                </div>
            </div>
        `).join('');

        updateStats();
    }

    // Toggle Todo
    function toggleTodo(id) {
        const todo = todos.find(t => t.id === id);
        if (todo) {
            todo.completed = !todo.completed;
            saveTodos();
            renderTodos();
        }
    }

    // Delete Todo
    function deleteTodo(id) {
        if (confirm('确定删除此任务吗？')) {
            todos = todos.filter(t => t.id !== id);
            saveTodos();
            renderTodos();
        }
    }

    // Filter Todos
    function filterTodos(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
        renderTodos();
    }

    // Edit Modal
    function openEdit(id) {
        editingId = id;
        const todo = todos.find(t => t.id === id);
        document.getElementById('edit-input').value = todo.text;
        document.getElementById('edit-priority').value = todo.priority;
        document.getElementById('edit-modal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('edit-modal').classList.remove('active');
        editingId = null;
    }

    function saveEdit() {
        const todo = todos.find(t => t.id === editingId);
        const text = document.getElementById('edit-input').value.trim();
        const priority = document.getElementById('edit-priority').value;

        if (!text) {
            alert('任务内容不能为空');
            return;
        }

        todo.text = text;
        todo.priority = priority;
        saveTodos();
        closeModal();
        renderTodos();
    }

    // Clear All
    function clearAll() {
        if (confirm('确定清空所有任务吗？此操作不可恢复！')) {
            todos = [];
            saveTodos();
            renderTodos();
        }
    }

    // Update Stats
    function updateStats() {
        const total = todos.length;
        const completed = todos.filter(t => t.completed).length;
        const pending = total - completed;

        document.getElementById('total-count').textContent = total;
        document.getElementById('completed-count').textContent = completed;
        document.getElementById('pending-count').textContent = pending;
    }

    // Utility Functions
    function priorityText(priority) {
        const map = { high: '高', medium: '中', low: '低' };
        return map[priority];
    }

    function escapeHtml(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Keyboard Support
    document.getElementById('todo-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            addTodo();
        }
    });

    document.getElementById('edit-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            saveEdit();
        }
    });

    // Initial Render
    renderTodos();
</script>

</body>
</html>
